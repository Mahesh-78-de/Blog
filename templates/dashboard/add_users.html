{% extends 'base.html' %}
{% block content %}
{% load crispy_forms_tags %}
<div class="row">
<!-- include the sidebar here -->
 {% include 'dashboard/sidebar.html' %}

 <div class="colmd-9">
   {% if perms.auth.add_users %}
     <h3> Add New Users </h3>
    <form action="{% url 'add_users' %}" method="post" enctype="multipart/form-data" style="width: 700px;" >
    {% csrf_token %}

    {{form | crispy }}

    <button type="submit" class="btn btn-warning"> Submit</button>
        
    </form>
    {% else %}
     <h3> You have not the access </h3>
    {% endif %}
  


 </div>

</div>


{% endblock %}
