{% extends 'base.html' %}
{% block content %}
  


  <!-- Category Post -->
   <h3 class="text-uppercase text-warning " style="letter-spacing: 2px;">Category Posts - {{ category.category_name }}</h3>
    

  <div class="row mb-2">
    {% for blog_post in posts %}
   
    <div class="col-md-6">
      <div class="card border-0" >
        <div class="card-body">
          <h3> <a href="{% url 'category_posts' blog_post.category.id %}" class='text-dark'>{{ blog_post.title }}</a></h3>
          <small class="mb-1 text-muted">{{ blog_post.created_at|timesince }} ago |  {{ blog_post.author }}</small>
          <p class="card-text">{{ blog_post.short_description | truncatewords:20 }}</p>
        </div>
      </div>
    </div>
  
    {% endfor %}
  </div>
 </div>

 {% endblock %}
