{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
  <h3 class="text-center">Login</h3>
  <form action="{% url 'login' %}" method="POST" style="max-width: 500px; margin: 0 auto;">
    {% csrf_token %}
    {{ form |crispy }}
    <button type="submit" class="btn btn-warning">Submit</button>
  </form>
{% endblock %}
